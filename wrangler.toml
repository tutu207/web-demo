name = "cf-b2b-website"
main = "src/index.js"
compatibility_date = "2026-04-29"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "b2b_database"
database_id = "46573fc3-957b-48db-a238-cd8bb0288fbd"

# Environment variables
[vars]
ENVIRONMENT = "development"

# R2 Storage for images
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "b2b-product-images"

[[kv_namespaces]]
binding = "STATIC_ASSETS" #
id = "22b6117b7ba74b7e9935ae3b3abd11f7" # 从 Cloudflare 获取的 KV Namespace ID